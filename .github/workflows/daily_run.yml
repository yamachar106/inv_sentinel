name: MEGA BreakOut Daily

on:
  schedule:
    # JP市場終了後: 16:00 JST = 07:00 UTC（月〜金）— JP MEGAのみ
    - cron: "0 7 * * 1-5"
    # US市場終了後: 06:00 JST = 21:00 UTC（月〜金）— US + JP全戦略
    - cron: "0 21 * * 1-5"
    # 朝リマインド: 08:00 JST = 23:00 UTC（日〜木）— 前日確定のアクション再通知
    - cron: "0 23 * * 0-4"

  workflow_dispatch:
    inputs:
      strategy:
        description: "Strategy to run (blank = all)"
        required: false
        type: choice
        options:
          - ""
          - jp-mega
        default: ""
      universe:
        description: "US universe preset"
        required: false
        type: choice
        options:
          - us_all
          - us_mid
          - sp500
        default: us_all
      limit:
        description: "Stock limit (0 = all)"
        required: false
        type: number
        default: 0
      dry-run:
        description: "Skip Slack notifications"
        required: false
        type: boolean
        default: false
      skip-healthcheck:
        description: "Skip healthcheck"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

env:
  SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
  SLACK_WEBHOOK_MEGA_US: ${{ secrets.SLACK_WEBHOOK_MEGA_US }}
  SLACK_WEBHOOK_MEGA_JP: ${{ secrets.SLACK_WEBHOOK_MEGA_JP }}
  GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
  PYTHONIOENCODING: utf-8

jobs:
  mega-daily:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore caches
        uses: actions/cache@v4
        with:
          path: |
            data/cache
            data/universe
          key: daily-cache-${{ github.run_id }}
          restore-keys: |
            daily-cache-

      - name: Determine run parameters
        id: params
        run: |
          ARGS=""

          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "trigger=schedule" >> $GITHUB_OUTPUT
            HOUR=$(date -u +%H)
            # 朝リマインド (23:00 UTC = 08:00 JST) → 再通知のみ
            if [ "$HOUR" -ge 22 ] || [ "$HOUR" -le 0 ]; then
              ARGS="--morning-reminder"
              echo "args=$ARGS" >> $GITHUB_OUTPUT
              echo "Run args: $ARGS (morning reminder)"
              exit 0
            fi
            # JP夕方スケジュール (07:00 UTC = 16:00 JST) → JP MEGAのみ実行
            if [ "$HOUR" -ge 6 ] && [ "$HOUR" -le 8 ]; then
              ARGS="--strategy jp-mega --skip-healthcheck"
              echo "args=$ARGS" >> $GITHUB_OUTPUT
              echo "Run args: $ARGS (JP evening schedule)"
              exit 0
            fi
          else
            echo "trigger=manual" >> $GITHUB_OUTPUT

            STRATEGY="${{ github.event.inputs.strategy }}"
            if [ -n "$STRATEGY" ]; then
              ARGS="$ARGS --strategy $STRATEGY"
            fi

            UNIVERSE="${{ github.event.inputs.universe }}"
            LIMIT="${{ github.event.inputs.limit }}"

            if [ -n "$UNIVERSE" ]; then
              ARGS="$ARGS --universe $UNIVERSE"
            fi
            if [ "$LIMIT" != "0" ] && [ -n "$LIMIT" ]; then
              ARGS="$ARGS --limit $LIMIT"
            fi
            if [ "${{ github.event.inputs.dry-run }}" = "true" ]; then
              ARGS="$ARGS --dry-run"
            fi
            if [ "${{ github.event.inputs.skip-healthcheck }}" = "true" ]; then
              ARGS="$ARGS --skip-healthcheck"
            fi
          fi

          echo "args=$ARGS" >> $GITHUB_OUTPUT
          echo "Run args: $ARGS"

      - name: Run MEGA daily monitor
        run: |
          echo "Running: python daily_run.py ${{ steps.params.outputs.args }}"
          python daily_run.py ${{ steps.params.outputs.args }}

      - name: Refresh dashboard cache
        run: |
          echo "Refreshing MEGA dashboard cache..."
          python dashboard/refresh_cache.py || echo "Cache refresh failed (non-critical)"

      - name: Commit signal history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for dir in data/signals data/universe data/cache; do
            [ -d "$dir" ] && git add "$dir/"
          done
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "MEGA signals $(date -u +%Y-%m-%d) [${{ steps.params.outputs.trigger }}]"
            git push
          fi

      - name: Notify on failure
        if: failure()
        run: |
          WEBHOOK="${SLACK_WEBHOOK_MEGA_US:-$SLACK_WEBHOOK_URL}"
          if [ -n "$WEBHOOK" ]; then
            curl -s -X POST "$WEBHOOK" \
              -H 'Content-Type: application/json' \
              -d "{\"text\":\"🚨 *MEGA Pipeline FAILED* (${{ steps.params.outputs.trigger }})\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\n即座に確認してください。BOシグナルを逃す可能性があります。\"}" \
              --retry 3 --retry-delay 5
          fi

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mega-${{ steps.params.outputs.trigger }}-${{ github.run_id }}
          path: |
            data/signals/
            data/logs/
          retention-days: 30
          if-no-files-found: ignore
