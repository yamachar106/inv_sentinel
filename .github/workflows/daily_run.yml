name: MEGA BreakOut Daily

on:
  schedule:
    # JP MEGA: 16:00 JST (月〜金)
    - cron: "0 7 * * 1-5"
    # Full Run (US+JP): 06:00 JST (火〜土)
    - cron: "0 21 * * 1-5"
    # 朝リマインド: 08:00 JST (月〜金)
    - cron: "0 23 * * 0-4"
  workflow_dispatch:
    inputs:
      strategy:
        description: "Run mode"
        required: false
        type: choice
        options:
          - full
          - jp-mega
          - monitor
          - morning-reminder
        default: full
      universe:
        description: "US universe preset"
        required: false
        type: choice
        options:
          - us_all
          - us_mid
          - sp500
        default: us_all
      limit:
        description: "Stock limit (0 = all)"
        required: false
        type: number
        default: 0
      dry-run:
        description: "Skip Slack notifications"
        required: false
        type: boolean
        default: false
      skip-healthcheck:
        description: "Skip healthcheck"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

env:
  SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
  SLACK_WEBHOOK_MEGA_US: ${{ secrets.SLACK_WEBHOOK_MEGA_US }}
  SLACK_WEBHOOK_MEGA_JP: ${{ secrets.SLACK_WEBHOOK_MEGA_JP }}
  GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
  PYTHONIOENCODING: utf-8

jobs:
  mega-daily:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore caches
        uses: actions/cache@v4
        with:
          path: |
            data/cache
            data/universe
          key: daily-cache-${{ github.run_id }}
          restore-keys: |
            daily-cache-

      - name: Determine run parameters
        id: params
        run: |
          ARGS=""

          # schedule トリガーの場合、cron時刻からstrategyを判定
          if [ "${{ github.event_name }}" = "schedule" ]; then
            CRON="${{ github.event.schedule }}"
            if [ "$CRON" = "0 23 * * 0-4" ]; then
              STRATEGY="morning-reminder"
            elif [ "$CRON" = "0 7 * * 1-5" ]; then
              STRATEGY="jp-mega"
            else
              STRATEGY="full"
            fi
          else
            STRATEGY="${{ github.event.inputs.strategy }}"
          fi

          if [ "$STRATEGY" = "morning-reminder" ]; then
            ARGS="--morning-reminder"
            echo "args=$ARGS" >> $GITHUB_OUTPUT
            echo "mode=morning-reminder" >> $GITHUB_OUTPUT
            echo "Run args: $ARGS"
            exit 0
          fi

          if [ "$STRATEGY" = "jp-mega" ]; then
            ARGS="--strategy jp-mega --skip-healthcheck"
          elif [ "$STRATEGY" = "monitor" ]; then
            ARGS="--strategy monitor"
          fi
          # "full" or default: no --strategy flag (daily_run.py runs all)

          UNIVERSE="${{ github.event.inputs.universe }}"
          LIMIT="${{ github.event.inputs.limit }}"

          if [ -n "$UNIVERSE" ]; then
            ARGS="$ARGS --universe $UNIVERSE"
          fi
          if [ "$LIMIT" != "0" ] && [ -n "$LIMIT" ]; then
            ARGS="$ARGS --limit $LIMIT"
          fi
          if [ "${{ github.event.inputs.dry-run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ "${{ github.event.inputs.skip-healthcheck }}" = "true" ]; then
            ARGS="$ARGS --skip-healthcheck"
          fi

          echo "args=$ARGS" >> $GITHUB_OUTPUT
          echo "mode=$STRATEGY" >> $GITHUB_OUTPUT
          echo "Run args: $ARGS"

      - name: Run MEGA daily monitor
        run: |
          echo "Running: python daily_run.py ${{ steps.params.outputs.args }}"
          python daily_run.py ${{ steps.params.outputs.args }}

      - name: Refresh dashboard cache
        if: steps.params.outputs.mode != 'morning-reminder'
        run: |
          echo "Refreshing MEGA dashboard cache..."
          python dashboard/refresh_cache.py || echo "Cache refresh failed (non-critical)"

      - name: Commit signal history
        if: steps.params.outputs.mode != 'morning-reminder'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for dir in data/signals data/universe data/cache; do
            [ -d "$dir" ] && git add "$dir/"
          done
          [ -f data/portfolio.json ] && git add data/portfolio.json
          [ -f data/portfolio_history.json ] && git add data/portfolio_history.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "MEGA signals $(date -u +%Y-%m-%d) [${{ steps.params.outputs.mode }}]"
            git push
          fi

      - name: Notify on failure
        if: failure()
        run: |
          WEBHOOK="${SLACK_WEBHOOK_MEGA_US:-$SLACK_WEBHOOK_URL}"
          if [ -n "$WEBHOOK" ]; then
            curl -s -X POST "$WEBHOOK" \
              -H 'Content-Type: application/json' \
              -d "{\"text\":\"🚨 *MEGA Pipeline FAILED* (${{ steps.params.outputs.mode }})\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\n即座に確認してください。BOシグナルを逃す可能性があります。\"}" \
              --retry 3 --retry-delay 5
          fi

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mega-${{ steps.params.outputs.mode }}-${{ github.run_id }}
          path: |
            data/signals/
            data/logs/
          retention-days: 30
          if-no-files-found: ignore
